<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CW47 — Textual Entailment Demo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/qrcode-generator@1.4.4/qrcode.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body, #root { height: 100%; width: 100%; overflow: auto; }
  body { font-family: 'DM Sans', sans-serif; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "dark",
  "accentHue": 250
}/*EDITMODE-END*/;

const themes = {
  dark: {
    bg: '#0a0a0f',
    surface: '#141420',
    surfaceHover: '#1c1c2e',
    border: '#2a2a3d',
    text: '#e8e8f0',
    textMuted: '#8888a0',
    accent: (h) => `oklch(0.7 0.18 ${h})`,
    accentSoft: (h) => `oklch(0.25 0.06 ${h})`,
    accentGlow: (h) => `oklch(0.7 0.18 ${h} / 0.15)`,
    entailment: '#22c55e',
    entailmentBg: 'rgba(34,197,94,0.1)',
    notEntailment: '#ef4444',
    notEntailmentBg: 'rgba(239,68,68,0.1)',
    font: "'DM Sans', sans-serif",
    mono: "'JetBrains Mono', monospace",
  },
  light: {
    bg: '#f5f5f7',
    surface: '#ffffff',
    surfaceHover: '#fafafa',
    border: '#e0e0e6',
    text: '#1a1a2e',
    textMuted: '#6b6b80',
    accent: (h) => `oklch(0.55 0.2 ${h})`,
    accentSoft: (h) => `oklch(0.92 0.04 ${h})`,
    accentGlow: (h) => `oklch(0.55 0.2 ${h} / 0.08)`,
    entailment: '#16a34a',
    entailmentBg: 'rgba(22,163,74,0.08)',
    notEntailment: '#dc2626',
    notEntailmentBg: 'rgba(220,38,38,0.08)',
    font: "'DM Sans', sans-serif",
    mono: "'JetBrains Mono', monospace",
  },
  editorial: {
    bg: '#faf8f5',
    surface: '#ffffff',
    surfaceHover: '#fdfcfa',
    border: '#e8e2d8',
    text: '#2c2418',
    textMuted: '#8a7e6e',
    accent: (h) => `oklch(0.52 0.14 ${h})`,
    accentSoft: (h) => `oklch(0.94 0.03 ${h})`,
    accentGlow: (h) => `oklch(0.52 0.14 ${h} / 0.08)`,
    entailment: '#2d8a4e',
    entailmentBg: 'rgba(45,138,78,0.08)',
    notEntailment: '#c23028',
    notEntailmentBg: 'rgba(194,48,40,0.08)',
    font: "'Instrument Serif', serif",
    mono: "'JetBrains Mono', monospace",
  }
};

const EXAMPLES = [
  { premise: "A person on a horse jumps over a broken down airplane.", hypothesis: "A person is outdoors, on a horse.", expected: "Entailment" },
  { premise: "Two doctors performed surgery in the hospital.", hypothesis: "Medical professionals operated on a patient.", expected: "Entailment" },
  { premise: "A young girl is playing the piano on stage.", hypothesis: "A child is making music in front of an audience.", expected: "Entailment" },
  { premise: "The dog is sleeping on the couch.", hypothesis: "The animal is awake and running outside.", expected: "Not Entailment" },
  { premise: "The chef is carefully preparing pasta in the kitchen.", hypothesis: "The chef is asleep in bed.", expected: "Not Entailment" },
];

function App() {
  const [tweaks, setTweaks] = window.useTweaks(TWEAK_DEFAULTS);
  const t = themes[tweaks.theme] || themes.dark;
  const hue = tweaks.accentHue;

  const [premise, setPremise] = React.useState('');
  const [hypothesis, setHypothesis] = React.useState('');
  const [model, setModel] = React.useState('OracleNet');
  const [loading, setLoading] = React.useState(false);
  const [result, setResult] = React.useState(null);
  const [rawLog, setRawLog] = React.useState(null);
  const [stage, setStage] = React.useState(null);
  const [status, setStatus] = React.useState(null);
  const [expandedStatus, setExpandedStatus] = React.useState({});
  const [publicUrl, setPublicUrl] = React.useState(null);

  React.useEffect(() => {
    fetch('/api/status')
      .then(r => r.json())
      .then(d => setStatus(d.groups))
      .catch(() => setStatus([]));
    fetch('/api/public-url')
      .then(r => r.json())
      .then(d => setPublicUrl(d.url || ''))
      .catch(() => setPublicUrl(''));
  }, []);

  const isEditorial = tweaks.theme === 'editorial';

  const handlePredict = async () => {
    if (!premise.trim() || !hypothesis.trim()) return;
    setLoading(true);
    setResult(null);
    setRawLog(null);
    setStage(null);

    try {
      const resp = await fetch('/api/predict', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ premise, hypothesis, model }),
      });
      if (!resp.ok && resp.headers.get('content-type')?.includes('application/json')) {
        const err = await resp.json();
        throw new Error(err.error || `HTTP ${resp.status}`);
      }
      if (!resp.body) throw new Error('streaming not supported by this browser');

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';
      let finalEvent = null;
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        let nl;
        while ((nl = buf.indexOf('\n')) >= 0) {
          const line = buf.slice(0, nl).trim();
          buf = buf.slice(nl + 1);
          if (!line) continue;
          let ev;
          try { ev = JSON.parse(line); } catch { continue; }
          if (ev.type === 'progress') {
            setStage(ev.label || ev.stage || 'Working');
          } else {
            finalEvent = ev;
          }
        }
      }
      if (!finalEvent) throw new Error('no result received from server');
      setRawLog(finalEvent);
      if (finalEvent.type === 'error') throw new Error(finalEvent.error);
      setResult({
        label: finalEvent.label,
        confidence: finalEvent.confidence,
        model: finalEvent.model,
      });
    } catch (e) {
      setResult({ error: e.message || String(e), model });
    } finally {
      setStage(null);
      setLoading(false);
    }
  };

  const loadExample = (ex) => {
    setPremise(ex.premise);
    setHypothesis(ex.hypothesis);
    setResult(null);
    setRawLog(null);
  };

  const s = {
    root: {
      minHeight: '100%', width: '100%', background: t.bg, color: t.text,
      fontFamily: t.font, display: 'flex', flexDirection: 'column',
      alignItems: 'center', justifyContent: 'center',
      padding: 'clamp(16px, 4vw, 32px)',
      transition: 'background 0.3s ease, color 0.3s ease',
      position: 'relative', overflow: 'auto',
    },
    container: {
      width: '100%', maxWidth: 640, display: 'flex', flexDirection: 'column',
      gap: 'clamp(14px, 3vw, 24px)',
    },
    header: {
      textAlign: 'center', marginBottom: 8,
    },
    badge: {
      display: 'inline-block', fontFamily: t.mono, fontSize: 11, fontWeight: 600,
      letterSpacing: '0.08em', textTransform: 'uppercase',
      color: t.accent(hue), background: t.accentSoft(hue),
      padding: '4px 12px', borderRadius: 20, marginBottom: 12,
    },
    title: {
      fontSize: isEditorial ? 36 : 28, fontWeight: isEditorial ? 400 : 700,
      fontStyle: isEditorial ? 'italic' : 'normal',
      letterSpacing: isEditorial ? '-0.01em' : '-0.03em',
      lineHeight: 1.2, marginBottom: 6,
    },
    subtitle: {
      fontSize: 14, color: t.textMuted, fontFamily: t.mono, fontWeight: 400,
    },
    card: {
      background: t.surface, border: `1px solid ${t.border}`,
      borderRadius: 14, padding: 24, display: 'flex', flexDirection: 'column', gap: 18,
    },
    label: {
      fontSize: 12, fontWeight: 600, letterSpacing: '0.04em',
      textTransform: 'uppercase', color: t.textMuted, marginBottom: 6,
    },
    textarea: {
      width: '100%', background: t.bg, border: `1px solid ${t.border}`,
      borderRadius: 8, padding: '12px 14px', fontSize: 15, fontFamily: t.font,
      color: t.text, resize: 'vertical', minHeight: 72, outline: 'none',
      transition: 'border-color 0.2s',
    },
    modelRow: {
      display: 'flex', gap: 8,
    },
    modelBtn: (active) => ({
      flex: 1, padding: '10px 0', borderRadius: 8, fontSize: 14,
      fontFamily: t.mono, fontWeight: 500, cursor: 'pointer',
      border: active ? `2px solid ${t.accent(hue)}` : `1px solid ${t.border}`,
      background: active ? t.accentSoft(hue) : 'transparent',
      color: active ? t.accent(hue) : t.textMuted,
      transition: 'all 0.2s',
    }),
    predictBtn: {
      width: '100%', padding: '14px 0', borderRadius: 10, border: 'none',
      background: t.accent(hue), color: '#fff', fontSize: 16,
      fontWeight: 600, fontFamily: t.font, cursor: 'pointer',
      opacity: (!premise.trim() || !hypothesis.trim() || loading) ? 0.5 : 1,
      transition: 'all 0.2s',
    },
    resultCard: (isEnt) => ({
      background: isEnt ? t.entailmentBg : t.notEntailmentBg,
      border: `1px solid ${isEnt ? t.entailment : t.notEntailment}30`,
      borderRadius: 14, padding: 24, textAlign: 'center',
      animation: 'fadeIn 0.4s ease',
    }),
    resultLabel: (isEnt) => ({
      fontSize: 26, fontWeight: isEditorial ? 400 : 700,
      fontStyle: isEditorial ? 'italic' : 'normal',
      color: isEnt ? t.entailment : t.notEntailment,
      marginBottom: 4,
    }),
    confidence: {
      fontSize: 14, fontFamily: t.mono, color: t.textMuted,
    },
    exRow: {
      display: 'flex', gap: 8, justifyContent: 'center', flexWrap: 'wrap',
    },
    exBtn: {
      display: 'inline-flex', alignItems: 'center', gap: 10,
      fontSize: 12, fontFamily: t.mono, color: t.textMuted,
      background: t.surface, border: `1px solid ${t.border}`,
      borderRadius: 20, padding: '5px 6px 5px 16px', cursor: 'pointer',
      transition: 'all 0.15s',
    },
    exBadge: (isEnt) => ({
      width: 20, height: 20, borderRadius: '50%', flexShrink: 0,
      display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
      background: isEnt ? t.entailment : t.notEntailment,
      color: '#fff', fontSize: 12, fontWeight: 700, lineHeight: 1,
      fontFamily: t.font,
    }),
    spinnerRow: {
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      gap: 14, margin: '12px auto',
    },
    spinner: {
      width: 28, height: 28, border: `3px solid ${t.border}`,
      borderTopColor: t.accent(hue), borderRadius: '50%',
      animation: 'spin 0.8s linear infinite', flexShrink: 0,
    },
    stageText: {
      fontSize: 13, fontFamily: t.mono, color: t.textMuted,
      letterSpacing: '0.02em',
    },
    statusCard: {
      width: '100%',
      background: t.surface, border: `1px solid ${t.border}`,
      borderRadius: 14, padding: '20px 24px',
      display: 'flex', flexDirection: 'column', gap: 16,
    },
    qrCard: {
      width: '100%',
      background: t.surface, border: `1px solid ${t.border}`,
      borderRadius: 14, padding: 20,
      display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 12,
    },
    qrUrl: {
      fontSize: 12, fontFamily: t.mono, color: t.textMuted,
      wordBreak: 'break-all', textAlign: 'center',
    },
    statusHeader: {
      fontSize: 11, fontWeight: 600, letterSpacing: '0.12em',
      textTransform: 'uppercase', color: t.textMuted,
      marginBottom: 4,
    },
    statusRow: {
      display: 'grid', gridTemplateColumns: '14px 1fr auto',
      gap: 14, alignItems: 'center',
    },
    statusDot: (ok) => ({
      width: 10, height: 10, borderRadius: '50%',
      background: ok ? t.entailment : t.notEntailment,
      boxShadow: ok ? `0 0 0 3px ${t.entailmentBg}` : `0 0 0 3px ${t.notEntailmentBg}`,
    }),
    statusLabel: {
      fontSize: 15, color: t.text, fontWeight: 500, lineHeight: 1.3,
    },
    statusValue: (ok) => ({
      fontFamily: t.mono, fontSize: 13,
      color: ok ? t.entailment : t.notEntailment,
      textAlign: 'right',
    }),
    statusValueBtn: (ok) => ({
      fontFamily: t.mono, fontSize: 13, lineHeight: 1.3,
      color: ok ? t.entailment : t.notEntailment,
      background: 'transparent', border: 'none', padding: 0,
      cursor: ok ? 'default' : 'pointer',
      textAlign: 'right', whiteSpace: 'nowrap',
      textDecoration: ok ? 'none' : 'underline dotted',
      textUnderlineOffset: 3,
      alignSelf: 'center',
    }),
    statusMissing: {
      gridColumn: '2 / span 2',
      fontFamily: t.mono, fontSize: 11, color: t.textMuted,
      lineHeight: 1.6, paddingTop: 2, wordBreak: 'break-all',
    },
    statusEmpty: {
      fontFamily: t.mono, fontSize: 12, color: t.textMuted,
    },
    logCard: {
      background: t.surface, border: `1px dashed ${t.border}`,
      borderRadius: 12, padding: 16, fontFamily: t.mono, fontSize: 12,
      color: t.textMuted,
    },
    logHeader: {
      display: 'flex', justifyContent: 'space-between', alignItems: 'center',
      marginBottom: 8,
    },
    logTitle: {
      fontSize: 11, fontWeight: 600, letterSpacing: '0.08em',
      textTransform: 'uppercase', color: t.textMuted,
    },
    logPre: {
      margin: 0, whiteSpace: 'pre-wrap', wordBreak: 'break-word',
      color: t.text, lineHeight: 1.5, fontFamily: t.mono, fontSize: 12,
    },
  };

  return (
    <div style={s.root}>
      <style>{`
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        textarea:focus { border-color: ${t.accent(hue)} !important; }
        @media (min-width: 1100px) {
          .status-panel { position: fixed !important; right: 32px !important; top: 50% !important; transform: translateY(-50%) !important; width: 300px !important; z-index: 5; }
          .qr-panel { position: fixed !important; left: 32px !important; top: 50% !important; transform: translateY(-50%) !important; width: 240px !important; z-index: 5; }
        }
        @media (max-width: 1099px) {
          .status-panel, .qr-panel { width: 100% !important; }
        }
      `}</style>

      <div style={s.container}>
        <div style={s.header}>
          <div style={s.badge}>CW47 · COMP34812</div>
          <div style={s.title}>OracleNLI</div>
          <div style={{fontSize: isEditorial ? 20 : 18, color: t.textMuted, fontWeight: 400, marginBottom: 4}}>Textual Entailment</div>
          <div style={s.subtitle}>NLI: Category B and C</div>
        </div>

        <div style={s.card}>
          <div>
            <div style={s.label}>Premise</div>
            <textarea style={s.textarea} value={premise} onChange={e => { setPremise(e.target.value); setResult(null); setRawLog(null); }}
              placeholder="Enter the premise sentence…" rows={2} />
          </div>
          <div>
            <div style={s.label}>Hypothesis</div>
            <textarea style={s.textarea} value={hypothesis} onChange={e => { setHypothesis(e.target.value); setResult(null); setRawLog(null); }}
              placeholder="Enter the hypothesis sentence…" rows={2} />
          </div>
          <div>
            <div style={s.label}>Model</div>
            <div style={s.modelRow}>
              {[['OracleNet','CAT B','left'],['OracleTF','CAT C','right']].map(([m, cat, pos]) => (
                <button key={m} style={{...s.modelBtn(model === m), position:'relative', paddingTop: 18, paddingBottom: 18, display:'flex', alignItems:'center', justifyContent:'center'}} onClick={() => { setModel(m); setResult(null); setRawLog(null); }}>
                  <span style={{position:'absolute', top:4, [pos]:8, fontSize:9, fontWeight:600, opacity:0.6, letterSpacing:'0.05em'}}>{cat}</span>
                  {m}
                </button>
              ))}
            </div>
          </div>
          <button style={s.predictBtn} onClick={handlePredict}
            disabled={!premise.trim() || !hypothesis.trim() || loading}>
            {loading ? 'Running inference…' : 'Predict'}
          </button>
        </div>

        {loading && (
          <div style={s.spinnerRow}>
            <div style={s.spinner}></div>
            <div style={s.stageText}>{stage || 'Starting…'}</div>
          </div>
        )}

        {result && result.error && (
          <div style={{...s.resultCard(false), textAlign: 'left'}}>
            <div style={{...s.resultLabel(false), fontSize: 18}}>Inference failed</div>
            <div style={{...s.confidence, whiteSpace: 'pre-wrap'}}>{result.error}</div>
          </div>
        )}

        {result && !result.error && (
          <div style={s.resultCard(result.label === 'Entailment')}>
            <div style={s.resultLabel(result.label === 'Entailment')}>{result.label}</div>
            <div style={s.confidence}>
              {result.model} · {(result.confidence * 100).toFixed(1)}% confidence
            </div>
            <div style={{ marginTop: 12 }}>
              <div style={{ height: 6, background: t.border, borderRadius: 3, overflow: 'hidden' }}>
                <div style={{
                  width: `${result.confidence * 100}%`, height: '100%', borderRadius: 3,
                  background: result.label === 'Entailment' ? t.entailment : t.notEntailment,
                  transition: 'width 0.6s ease',
                }}></div>
              </div>
            </div>
          </div>
        )}

        {rawLog && (
          <div style={s.logCard}>
            <div style={s.logHeader}>
              <div style={s.logTitle}>predict.py · raw output</div>
            </div>
            <pre style={s.logPre}>{JSON.stringify(rawLog, null, 2)}</pre>
          </div>
        )}

        <div style={s.exRow}>
          {EXAMPLES.map((ex, i) => {
            const isEnt = ex.expected === 'Entailment';
            return (
              <button key={i} style={s.exBtn} onClick={() => loadExample(ex)}
                onMouseEnter={e => { e.currentTarget.style.borderColor = t.accent(hue); e.currentTarget.style.color = t.text; }}
                onMouseLeave={e => { e.currentTarget.style.borderColor = t.border; e.currentTarget.style.color = t.textMuted; }}>
                <span>Example {i + 1}</span>
                <span style={s.exBadge(isEnt)} aria-label={ex.expected}>{isEnt ? '✓' : '✕'}</span>
              </button>
            );
          })}
        </div>

        <div className="qr-panel" style={s.qrCard}>
          <div style={s.label}>Scan to Open</div>
          {publicUrl === null && (
            <div style={{...s.qrUrl, padding: '60px 0'}}>Loading…</div>
          )}
          {publicUrl === '' && (
            <div style={{...s.qrUrl, padding: '40px 0'}}>
              No public URL configured.<br/>
              Start the server with FLARE_TUNNEL=1 or PUBLIC_URL=&hellip; to expose one.
            </div>
          )}
          {publicUrl && (() => {
            const qr = window.qrcode(0, 'M');
            qr.addData(publicUrl);
            qr.make();
            const size = qr.getModuleCount();
            const cell = 200 / (size + 2);
            const offset = cell;
            const cells = [];
            for (let r = 0; r < size; r++) for (let c = 0; c < size; c++) {
              if (qr.isDark(r, c))
                cells.push(<rect key={`${r}-${c}`} x={offset+c*cell} y={offset+r*cell} width={cell} height={cell} fill="#000" />);
            }
            return (
              <React.Fragment>
                <a href={publicUrl} target="_blank" rel="noopener noreferrer" aria-label="Open public URL">
                  <svg viewBox="0 0 200 200" width="160" height="160" style={{background:'#fff', borderRadius:8, padding:8, display:'block'}}>
                    {cells}
                  </svg>
                </a>
                <a href={publicUrl} target="_blank" rel="noopener noreferrer"
                   style={{...s.qrUrl, color: t.accent(hue), textDecoration: 'none'}}>
                  {publicUrl.replace(/^https?:\/\//, '')}
                </a>
              </React.Fragment>
            );
          })()}
        </div>

        <div className="status-panel" style={s.statusCard}>
          <div style={s.statusHeader}>System Status</div>
          {status === null && <div style={s.statusEmpty}>Checking…</div>}
          {status && status.length === 0 && <div style={s.statusEmpty}>Status unavailable</div>}
          {status && status.map((item, i) => {
            const isOpen = !!expandedStatus[i];
            const toggle = () => {
              if (item.ok) return;
              setExpandedStatus(prev => ({ ...prev, [i]: !prev[i] }));
            };
            return (
              <React.Fragment key={i}>
                <div style={s.statusRow}>
                  <div style={s.statusDot(item.ok)}></div>
                  <div style={s.statusLabel}>{item.label}</div>
                  <button style={s.statusValueBtn(item.ok)} onClick={toggle}
                    disabled={item.ok}
                    aria-expanded={item.ok ? undefined : isOpen}>
                    {item.ok ? 'Downloaded' : `Not Downloaded (${item.missing.length})`}
                  </button>
                </div>
                {!item.ok && isOpen && (
                  <div style={s.statusRow}>
                    <div></div>
                    <div style={s.statusMissing}>
                      {item.missing.map((p, j) => <div key={j}>· {p}</div>)}
                    </div>
                  </div>
                )}
              </React.Fragment>
            );
          })}
        </div>
      </div>

      <TweaksPanel title="Tweaks">
        <TweakRadio label="Theme" value={tweaks.theme} options={[
          { label: 'Dark', value: 'dark' },
          { label: 'Light', value: 'light' },
          { label: 'Editorial', value: 'editorial' },
        ]} onChange={v => setTweaks({ theme: v })} />
        <TweakSlider label="Accent Hue" value={tweaks.accentHue} min={0} max={360} step={5}
          onChange={v => setTweaks({ accentHue: v })} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
